id: no-pii-in-logs
description: "Do not log personally identifiable information"
why: "PII in logs is a privacy and compliance risk; logs are widely accessible."

scope: [ci]
enforcement: warn
weight: 2

match:
  type: llm
  prompt: "Flag any logging or print statement that includes personally identifiable information such as email addresses, full names, phone numbers, or government IDs."
